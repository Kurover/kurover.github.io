<nav class="nav-main">
  <!-- MAIN -->
  <a 
    href="/" class="nav-list nav-list--home
      {% if page.url == "/" %} active{% endif %}" 
    id="nav-home" 
    aria-label="Home Page">
    <div class="nav-list__icon"></div>
  </a>
  <a href="/gallery" 
    class="nav-list nav-list--gallery
      {% if page.url == "/gallery.html" %}active{% endif %}" 
    id="nav-gallery" 
    aria-label="Gallery Page">
    <div class="nav-list__icon"></div>
  </a>
  <a 
    href="/blog" 
    class="nav-list nav-list--blog desktop-only
      {% if page.og-type == "blog" %}active{% endif %}" 
    id="nav-blog" 
    aria-label="Blog Page">
    <div class="nav-list__icon"></div>
  </a>
  <a 
    href="/file" 
    class="nav-list nav-list--file desktop-only
      {% if page.url == "/file.html" %} active{% endif %}" 
    id="nav-download"
    aria-label="File Page">
    <div class="nav-list__icon"></div>
  </a>
  <!-- ? More -->
  <div class="nav-list-expandable mobile-only">
    <div 
      class="nav-list nav-list--more nav-list-expandable__toggle  
        {% if (page.nav-more) or (page.og-type == "blog") %}active{% endif %}"
      id="nav-more"
      tabindex="0"
    >
      <button class="invisible" aria-label="Expand More Menu" tabindex="-1"></button> <!-- This is a fake button to tell accessibility that this div is a button since the world doesn't allow (semantically) div to have aria-label. This is like disabled person compromising to other disabled person with different disability. -->
      <div class="nav-list__icon"></div>
      <!-- * Expand Lists -->
      <div class="nav-list-expandable__content">
        <a 
          href="/blog" 
          class="nav-list nav-list--blog
            {% if page.og-type == "blog" %}active{% endif %}" 
          id="nav-blog-expand" 
          aria-label="Blog Page Button">
          <div class="nav-list__icon"></div>
        </a>
        <a 
          href="/file" 
          class="nav-list nav-list--file
            {% if page.url == "/file.html" %}active{% endif %}" 
          id="nav-download-expand" 
          aria-label="File Page Button">
          <div class="nav-list__icon"></div>
        </a>
      </div>
    </div>
    <div class="nav-list-expandable__state"></div> <!-- To deactivate the expand above when clicked again, for mobile mainly -->
  </div>
  <!-- ? EXTRA -->
  <div class="nav-list-expandable float-right">
    <div 
    class="nav-list nav-list--contact nav-list--toggleable more-link-popups" 
    id="nav-contact"
    tabindex="0"
    >
      <button class="invisible" aria-label="Expand Links Menu" tabindex="-1"></button>
      <div class="nav-list__icon"></div>
      <div class="more-link-popup">
        <div class="contact-lists contact-lists--navigation">
          <a href="/v2" class="contact-list contact--old"> <div class="contact-icon"></div> Old </a>
          <a href="/lab" class="contact-list contact--lab"> <div class="contact-icon"></div> Lab </a>
          <hr>
          <div class="contact-list contact-list--alt contact--bluesky" tabindex="-1">
            <a href="https://bsky.app/profile/zanster.bsky.social" target="_blank" rel="noopener"> <div class="contact-icon"></div> Bluesky </a>
            <span class="contact-list-tooltip">@zanster.bsky.social</span>
          </div>
          <div class="contact-list contact-list--alt contact--discord" tabindex="-1">
            <a href="https://discord.com/users/721010644756856883" target="_blank" rel="noopener"> <div class="contact-icon"></div> Discord </a>
            <span class="contact-list-tooltip">kurover_zan</span>
          </div>
          <a href="https://github.com/Kurover/kurover.github.io" target="_blank" rel="noopener" class="contact-list contact--github"> <div class="contact-icon"></div> Github </a>
          <div class="contact-list contact-list--alt contact--mail" tabindex="-1">
            <a href="mailto:kuroverzan@gmail.com"> <div class="contact-icon"></div> E-Mail </a>
            <span class="contact-list-tooltip m-right">kuroverzan@gmail.com</span>
          </div>
          <div class="contact-list contact-list--alt contact--twitter" tabindex="-1">
            <a href="https://twitter.com/Cloverift" target="_blank" rel="noopener"> <div class="contact-icon"></div> Twitter </a>
            <span class="contact-list-tooltip">@Cloverift</span>
          </div>
        </div>
        <hr>
        <p class="more-link-popup__txt-footer-left">Fonts <a href="http://04.jp.org" target="_blank" rel="noopener">04</a> <a href="https://fonts.google.com/specimen/Rubik" class="font-alternative" style="font-size: 14px;" target="_blank" rel="noopener">Rubik</a> <a href="https://github.com/tonsky/FiraCode" class="font-mono" style="font-size: 14px;" target="_blank" rel="noopener">Fira Code</a></p>
        <p class="more-link-popup__txt-footer-right">Meow!</p>
      </div>  
    </div>
    <div class="nav-list-expandable__state"></div>
  </div>
</nav>
